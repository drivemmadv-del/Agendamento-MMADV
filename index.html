<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMADV — Agendamentos Comerciais</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231F3864'/><text y='.9em' font-size='60' x='50%' text-anchor='middle' fill='%23C5A24A' font-weight='bold'>M</text></svg>" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (transforma o JSX no navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    /* ═══════════════════════════════════════════════════════════════════
       ┃  COLE AQUI AS 6 CREDENCIAIS DO SEU FIREBASE                      ┃
       ┃  (Configurações do projeto → Seus apps → ícone </>)             ┃
       ═══════════════════════════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "COLE_AQUI_apiKey",
      authDomain:        "COLE_AQUI_authDomain",
      projectId:         "COLE_AQUI_projectId",
      storageBucket:     "COLE_AQUI_storageBucket",
      messagingSenderId: "COLE_AQUI_messagingSenderId",
      appId:             "COLE_AQUI_appId",
    };
    /* ═══════════════════════════════════════════════════════════════════ */

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const { useState, useEffect } = React;

    // ─── Cores e configuração da equipe ───────────────────────────────
    const NAVY = "#1F3864";
    const GOLD = "#C5A24A";

    const TEAM = {
      SDR: ["Izabel", "Kelly"],
      "Social Seller": ["Daniel", "Camila"],
    };
    const CLOSERS = ["Laís", "Júlia", "Léo", "Malu", "Franklin", "Daniel"];

    const ALL_SCHEDULERS = Object.entries(TEAM).flatMap(([role, members]) =>
      members.map((name) => ({ name, role }))
    );

    const STATUS_CONFIG = {
      agendado:  { label: "Agendado",  color: "#1D4ED8", bg: "#DBEAFE", border: "#93C5FD" },
      realizado: { label: "Realizado", color: "#15803D", bg: "#DCFCE7", border: "#86EFAC" },
      cancelado: { label: "Cancelado", color: "#B91C1C", bg: "#FEE2E2", border: "#FCA5A5" },
      noshow:    { label: "No-show",   color: "#B45309", bg: "#FEF3C7", border: "#FCD34D" },
    };

    const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const EMPTY_FORM = {
      schedulerName: "", schedulerRole: "",
      closer: "", clientName: "", clientPhone: "",
      date: "", time: "", notes: "",
    };

    function fmtDate(d) {
      if (!d) return "—";
      const [y, m, day] = d.split("-");
      return `${day}/${m}/${y}`;
    }

    // ─── Ícones (SVG inline) ──────────────────────────────────────────
    function Svg({ children, size = 14 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {children}
        </svg>
      );
    }
    const IconPlus     = (p) => <Svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>;
    const IconCalendar = (p) => <Svg {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Svg>;
    const IconChart    = (p) => <Svg {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Svg>;
    const IconTrash    = (p) => <Svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Svg>;
    const IconUser     = (p) => <Svg {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Svg>;
    const IconClock    = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Svg>;
    const IconPhone    = (p) => <Svg {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Svg>;
    const IconNote     = (p) => <Svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Svg>;
    const IconCheck    = (p) => <Svg {...p}><polyline points="20 6 9 17 4 12"/></Svg>;
    const IconAlert    = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Svg>;
    const IconChevron  = (p) => <Svg {...p}><polyline points="9 18 15 12 9 6"/></Svg>;
    const IconWifiOff  = (p) => <Svg {...p}><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></Svg>;

    // ─── Componentes pequenos ─────────────────────────────────────────
    function StatusBadge({ status }) {
      const s = STATUS_CONFIG[status] || STATUS_CONFIG.agendado;
      return (
        <span style={{
          background: s.bg, color: s.color, border: `1px solid ${s.border}`,
          borderRadius: 99, padding: "2px 10px", fontSize: 11, fontWeight: 700,
          whiteSpace: "nowrap", display: "inline-block",
        }}>
          {s.label}
        </span>
      );
    }
    function CountBadge({ n, color, bg }) {
      return (
        <span style={{
          background: bg, color, borderRadius: 99,
          padding: "2px 10px", fontSize: 12, fontWeight: 700, display: "inline-block",
        }}>{n}</span>
      );
    }

    // ─── App principal ────────────────────────────────────────────────
    function App() {
      const [tab, setTab]           = useState("dashboard");
      const [meetings, setMeetings] = useState([]);
      const [loading, setLoading]   = useState(true);
      const [connected, setConnected] = useState(true);
      const [dbError, setDbError]   = useState(null);
      const [formOk, setFormOk]     = useState(false);
      const [formErr, setFormErr]   = useState("");
      const [saving, setSaving]     = useState(false);
      const [form, setForm]         = useState(EMPTY_FORM);

      const [fCloser, setFCloser] = useState("todos");
      const [fStatus, setFStatus] = useState("todos");
      const [fSched,  setFSched]  = useState("todos");
      const [sortBy,  setSortBy]  = useState("date_asc");

      // Listener em tempo real
      useEffect(() => {
        const unsub = db.collection("meetings").orderBy("createdAt", "desc").onSnapshot(
          (snapshot) => {
            const data = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
            setMeetings(data);
            setLoading(false);
            setConnected(true);
            setDbError(null);
          },
          (err) => {
            console.error("Firebase error:", err);
            setConnected(false);
            setDbError("Não foi possível conectar ao banco. Verifique as credenciais do Firebase no topo do arquivo.");
            setLoading(false);
          }
        );
        return () => unsub();
      }, []);

      function setF(key, val) { setForm((f) => ({ ...f, [key]: val })); }

      async function handleSubmit() {
        setFormErr("");
        if (!form.schedulerName || !form.closer || !form.clientName || !form.date || !form.time) {
          setFormErr("Preencha todos os campos marcados com *.");
          return;
        }
        setSaving(true);
        try {
          await db.collection("meetings").add({
            schedulerName: form.schedulerName,
            schedulerRole: form.schedulerRole,
            closer:        form.closer,
            clientName:    form.clientName,
            clientPhone:   form.clientPhone,
            date:          form.date,
            time:          form.time,
            notes:         form.notes,
            status:        "agendado",
            createdAt:     new Date().toISOString(),
          });
          setForm(EMPTY_FORM);
          setFormOk(true);
          setTimeout(() => { setFormOk(false); setTab("agenda"); }, 1400);
        } catch (err) {
          console.error(err);
          setFormErr("Erro ao salvar. Verifique a conexão e tente novamente.");
        } finally {
          setSaving(false);
        }
      }

      async function updateStatus(id, status) {
        try { await db.collection("meetings").doc(id).update({ status }); }
        catch (err) { console.error(err); alert("Erro ao atualizar."); }
      }

      async function removeMeeting(id) {
        if (!confirm("Remover este agendamento?")) return;
        try { await db.collection("meetings").doc(id).delete(); }
        catch (err) { console.error(err); alert("Erro ao remover."); }
      }

      const filtered = meetings
        .filter((m) =>
          (fCloser === "todos" || m.closer === fCloser) &&
          (fStatus === "todos" || m.status === fStatus) &&
          (fSched  === "todos" || m.schedulerName === fSched)
        )
        .sort((a, b) => {
          if (sortBy === "date_asc")  return (a.date + a.time).localeCompare(b.date + b.time);
          if (sortBy === "date_desc") return (b.date + b.time).localeCompare(a.date + a.time);
          return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        });

      const stats = {
        agendado:  meetings.filter((m) => m.status === "agendado").length,
        realizado: meetings.filter((m) => m.status === "realizado").length,
        cancelado: meetings.filter((m) => m.status === "cancelado").length,
        noshow:    meetings.filter((m) => m.status === "noshow").length,
      };

      const closerStats = CLOSERS.map((name) => ({
        name,
        agendado:  meetings.filter((m) => m.closer === name && m.status === "agendado").length,
        realizado: meetings.filter((m) => m.closer === name && m.status === "realizado").length,
        noshow:    meetings.filter((m) => m.closer === name && m.status === "noshow").length,
        total:     meetings.filter((m) => m.closer === name).length,
      }));

      const schedStats = ALL_SCHEDULERS.map((s) => ({
        ...s,
        total: meetings.filter((m) => m.schedulerName === s.name).length,
      }));

      if (loading) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-3" style={{ color: NAVY }}>
            <div className="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p className="text-sm text-gray-500">Conectando ao banco de dados...</p>
          </div>
        );
      }

      const inputCls = "w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500";
      const labelCls = "block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1.5";

      return (
        <div className="min-h-screen" style={{ background: "#F0EEE9" }}>

          {/* Header */}
          <header style={{ background: NAVY }} className="shadow-lg sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
              <div className="flex items-center gap-3">
                <div style={{ background: GOLD, color: NAVY, borderRadius: 8, width: 38, height: 38,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontWeight: 900, fontSize: 13, letterSpacing: 1 }}>MM</div>
                <div>
                  <div className="text-white font-black text-sm tracking-widest">MMADV</div>
                  <div className="text-white/40 text-xs mt-0.5">Agendamentos Comerciais</div>
                </div>
              </div>

              <div className="flex items-center gap-4">
                <div className="flex items-center gap-1.5">
                  {connected ? (
                    <>
                      <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>
                      <span className="text-white/40 text-xs hidden sm:block">Ao vivo</span>
                    </>
                  ) : (
                    <>
                      <span className="text-red-400"><IconWifiOff size={13} /></span>
                      <span className="text-red-400 text-xs hidden sm:block">Desconectado</span>
                    </>
                  )}
                </div>

                <nav className="flex gap-1">
                  {[
                    { k: "dashboard", label: "Dashboard", Icon: IconChart },
                    { k: "agendar",   label: "Agendar",   Icon: IconPlus },
                    { k: "agenda",    label: "Agenda",     Icon: IconCalendar },
                  ].map(({ k, label, Icon }) => (
                    <button key={k} onClick={() => setTab(k)} style={{
                      background: tab === k ? GOLD : "transparent",
                      color: tab === k ? NAVY : "rgba(255,255,255,0.65)",
                      border: "none", borderRadius: 8, cursor: "pointer",
                      padding: "8px 16px", fontWeight: tab === k ? 700 : 500,
                      fontSize: 13, display: "flex", alignItems: "center", gap: 6,
                    }}>
                      <Icon size={14} /> {label}
                    </button>
                  ))}
                </nav>
              </div>
            </div>
          </header>

          {dbError && (
            <div className="bg-red-50 border-b-2 border-red-300 px-6 py-3 flex items-center gap-2 text-red-700 text-sm">
              <IconAlert size={16} /> <strong>Erro de conexão:</strong> {dbError}
            </div>
          )}

          <main className="max-w-6xl mx-auto px-6 py-8">

            {/* DASHBOARD */}
            {tab === "dashboard" && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { k: "agendado",  label: "Agendados",  icon: "🕐", color: "#1D4ED8", accent: "#3B82F6" },
                    { k: "realizado", label: "Realizados", icon: "✅", color: "#15803D", accent: "#22C55E" },
                    { k: "cancelado", label: "Cancelados", icon: "✕", color: "#B91C1C", accent: "#EF4444" },
                    { k: "noshow",    label: "No-show",    icon: "👻", color: "#B45309", accent: "#F59E0B" },
                  ].map(({ k, label, icon, color, accent }) => (
                    <div key={k} className="bg-white rounded-xl p-5 shadow-sm flex items-center gap-4"
                      style={{ borderLeft: `4px solid ${accent}` }}>
                      <span style={{ fontSize: 28 }}>{icon}</span>
                      <div>
                        <div style={{ color, fontSize: 32, fontWeight: 900, lineHeight: 1 }}>{stats[k]}</div>
                        <div className="text-xs text-gray-400 mt-1">{label}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="grid gap-5 lg:grid-cols-[1.5fr_1fr]">
                  <div className="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div className="px-5 py-4 border-b border-gray-100 flex items-center gap-2">
                      <span style={{ background: "#FBF3E3", color: "#8B6914", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>CLOSERS</span>
                      <span className="font-semibold text-sm" style={{ color: NAVY }}>Performance</span>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="bg-gray-50">
                            {["Closer","Pendente","Realizado","No-show","Total"].map((h) => (
                              <th key={h} className="px-4 py-3 text-xs font-bold uppercase tracking-wide text-gray-400"
                                style={{ textAlign: h === "Closer" ? "left" : "center" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {closerStats.map((c) => (
                            <tr key={c.name} className="border-t border-gray-50 hover:bg-gray-50">
                              <td className="px-4 py-3 font-semibold" style={{ color: NAVY }}>{c.name}</td>
                              <td className="px-4 py-3 text-center"><CountBadge n={c.agendado}  color="#1D4ED8" bg="#DBEAFE" /></td>
                              <td className="px-4 py-3 text-center"><CountBadge n={c.realizado} color="#15803D" bg="#DCFCE7" /></td>
                              <td className="px-4 py-3 text-center"><CountBadge n={c.noshow}    color="#B45309" bg="#FEF3C7" /></td>
                              <td className="px-4 py-3 text-center font-black text-base" style={{ color: NAVY }}>{c.total}</td>
                            </tr>
                          ))}
                          {closerStats.every((c) => c.total === 0) && (
                            <tr><td colSpan={5} className="px-5 py-10 text-center text-gray-400 text-sm">Nenhum agendamento ainda</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="flex flex-col gap-4">
                    <div className="bg-white rounded-xl shadow-sm overflow-hidden flex-1">
                      <div className="px-5 py-4 border-b border-gray-100 font-semibold text-sm" style={{ color: NAVY }}>📊 Agendadores</div>
                      {schedStats.map((s) => (
                        <div key={s.name} className="px-5 py-3.5 border-b border-gray-50 last:border-0 flex items-center justify-between">
                          <div>
                            <div className="font-semibold text-sm" style={{ color: NAVY }}>{s.name}</div>
                            <div className="text-xs text-gray-400">{s.role}</div>
                          </div>
                          <div className="font-black text-2xl" style={{ color: NAVY }}>{s.total}</div>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => setTab("agendar")}
                      className="w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 text-sm"
                      style={{ background: NAVY, border: "none", cursor: "pointer" }}>
                      <IconPlus size={16} /> Novo Agendamento
                    </button>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm overflow-hidden">
                  <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                    <span className="font-semibold text-sm" style={{ color: NAVY }}>🕑 Últimos Agendamentos</span>
                    {meetings.length > 0 && (
                      <button onClick={() => setTab("agenda")} className="text-xs flex items-center gap-0.5 font-semibold"
                        style={{ color: GOLD, background: "none", border: "none", cursor: "pointer" }}>
                        Ver todos <IconChevron size={12} />
                      </button>
                    )}
                  </div>
                  {meetings.slice(0, 6).map((m) => (
                    <div key={m.id} className="px-5 py-3.5 border-b border-gray-50 last:border-0 flex items-center justify-between">
                      <div>
                        <span className="font-semibold text-sm" style={{ color: NAVY }}>{m.clientName}</span>
                        <span className="text-xs text-gray-400 ml-3">{fmtDate(m.date)} {m.time} · Closer: {m.closer} · {m.schedulerName}</span>
                      </div>
                      <StatusBadge status={m.status} />
                    </div>
                  ))}
                  {meetings.length === 0 && (
                    <div className="py-12 text-center text-sm text-gray-400">
                      Nenhum agendamento ainda.{" "}
                      <button onClick={() => setTab("agendar")} style={{ color: NAVY, background: "none", border: "none", cursor: "pointer", fontWeight: 700 }}>Criar agora →</button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* AGENDAR */}
            {tab === "agendar" && (
              <div className="max-w-lg mx-auto">
                <div className="bg-white rounded-2xl shadow-lg overflow-hidden">
                  <div className="px-8 py-7 relative overflow-hidden" style={{ background: NAVY }}>
                    <div style={{ position: "absolute", right: -24, top: -24, width: 130, height: 130, borderRadius: "50%", background: "rgba(197,162,74,0.12)" }}></div>
                    <IconPlus size={18} />
                    <h2 className="text-white font-black text-xl mt-2">Novo Agendamento</h2>
                    <p className="text-xs mt-1" style={{ color: "rgba(255,255,255,0.45)" }}>Registre uma consulta para os closers</p>
                  </div>

                  {formOk && (
                    <div className="px-8 py-3 flex items-center gap-2 text-sm font-bold border-b-2" style={{ background: "#DCFCE7", color: "#15803D", borderColor: "#86EFAC" }}>
                      <IconCheck size={15} /> Agendamento salvo! Redirecionando...
                    </div>
                  )}
                  {formErr && (
                    <div className="px-8 py-3 flex items-center gap-2 text-sm font-bold border-b-2" style={{ background: "#FEE2E2", color: "#B91C1C", borderColor: "#FCA5A5" }}>
                      <IconAlert size={15} /> {formErr}
                    </div>
                  )}

                  <div className="px-8 py-7 space-y-5">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className={labelCls}>Agendador *</label>
                        <select value={form.schedulerName}
                          onChange={(e) => {
                            const n = e.target.value;
                            const s = ALL_SCHEDULERS.find((x) => x.name === n);
                            setForm((f) => ({ ...f, schedulerName: n, schedulerRole: s ? s.role : "" }));
                          }} className={inputCls}>
                          <option value="">Selecione...</option>
                          <optgroup label="SDR">{TEAM.SDR.map((n) => <option key={n} value={n}>{n}</option>)}</optgroup>
                          <optgroup label="Social Seller">{TEAM["Social Seller"].map((n) => <option key={n} value={n}>{n}</option>)}</optgroup>
                        </select>
                        {form.schedulerRole && <div className="mt-1 text-xs font-bold" style={{ color: GOLD }}>{form.schedulerRole}</div>}
                      </div>
                      <div>
                        <label className={labelCls}>Closer *</label>
                        <select value={form.closer} onChange={(e) => setF("closer", e.target.value)} className={inputCls}>
                          <option value="">Selecione...</option>
                          {CLOSERS.map((c) => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className={labelCls}>Nome do Cliente *</label>
                      <input type="text" placeholder="Nome completo" value={form.clientName} onChange={(e) => setF("clientName", e.target.value)} className={inputCls} />
                    </div>
                    <div>
                      <label className={labelCls}>WhatsApp do Cliente</label>
                      <input type="text" placeholder="(00) 00000-0000" value={form.clientPhone} onChange={(e) => setF("clientPhone", e.target.value)} className={inputCls} />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className={labelCls}>Data *</label>
                        <input type="date" value={form.date} onChange={(e) => setF("date", e.target.value)} className={inputCls} />
                      </div>
                      <div>
                        <label className={labelCls}>Horário *</label>
                        <input type="time" value={form.time} onChange={(e) => setF("time", e.target.value)} className={inputCls} />
                      </div>
                    </div>
                    <div>
                      <label className={labelCls}>Observações</label>
                      <textarea placeholder="Contexto do lead, urgência, tipo de caso..." value={form.notes}
                        onChange={(e) => setF("notes", e.target.value)} rows={3} className={inputCls} style={{ resize: "vertical" }}></textarea>
                    </div>

                    <button onClick={handleSubmit} disabled={saving}
                      className="w-full py-3.5 rounded-xl font-black text-white text-base flex items-center justify-center gap-2"
                      style={{ background: NAVY, border: "none", cursor: saving ? "not-allowed" : "pointer", opacity: saving ? 0.7 : 1 }}>
                      {saving ? "Salvando..." : <>Confirmar Agendamento <IconChevron size={16} /></>}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* AGENDA */}
            {tab === "agenda" && (
              <div className="space-y-5">
                <div className="bg-white rounded-xl shadow-sm p-5">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {[
                      { label: "Closer", val: fCloser, set: setFCloser, opts: [["todos","Todos"], ...CLOSERS.map((c) => [c, c])] },
                      { label: "Status", val: fStatus, set: setFStatus, opts: [["todos","Todos"],["agendado","Agendado"],["realizado","Realizado"],["cancelado","Cancelado"],["noshow","No-show"]] },
                      { label: "Agendador", val: fSched, set: setFSched, opts: [["todos","Todos"], ...ALL_SCHEDULERS.map((s) => [s.name, `${s.name} (${s.role})`])] },
                      { label: "Ordenar", val: sortBy, set: setSortBy, opts: [["date_asc","Data ↑"],["date_desc","Data ↓"],["created","Mais recentes"]] },
                    ].map(({ label, val, set, opts }) => (
                      <div key={label}>
                        <div className={labelCls}>{label}</div>
                        <select value={val} onChange={(e) => set(e.target.value)} className={inputCls}>
                          {opts.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                  <div className="mt-4 flex items-center justify-between">
                    <span className="text-xs text-gray-400">{filtered.length} resultado(s)</span>
                    <button onClick={() => setTab("agendar")} className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold text-white"
                      style={{ background: NAVY, border: "none", cursor: "pointer" }}>
                      <IconPlus size={13} /> Novo
                    </button>
                  </div>
                </div>

                <div className="space-y-3">
                  {filtered.map((m) => {
                    const sc = STATUS_CONFIG[m.status] || STATUS_CONFIG.agendado;
                    const dayNum = m.date ? m.date.split("-")[2] : "—";
                    const monStr = m.date ? MONTHS[parseInt(m.date.split("-")[1]) - 1] : "";
                    return (
                      <div key={m.id} className="bg-white rounded-xl shadow-sm p-5 flex items-start gap-4" style={{ borderLeft: `4px solid ${sc.border}` }}>
                        <div className="bg-gray-50 rounded-xl p-3 text-center shrink-0" style={{ minWidth: 56 }}>
                          <div className="font-black text-2xl leading-none" style={{ color: NAVY }}>{dayNum}</div>
                          <div className="text-gray-400 text-xs uppercase mt-0.5">{monStr}</div>
                          <div className="font-bold text-xs mt-2 text-gray-600">{m.time || "—"}</div>
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2.5 mb-2 flex-wrap">
                            <span className="font-black text-base" style={{ color: NAVY }}>{m.clientName}</span>
                            <StatusBadge status={m.status} />
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-1">
                            <span className="flex items-center gap-1.5 text-xs text-gray-500"><IconUser size={11} /> Closer: <strong style={{ color: NAVY, marginLeft: 2 }}>{m.closer}</strong></span>
                            <span className="flex items-center gap-1.5 text-xs text-gray-500"><IconClock size={11} /> Por: <strong style={{ color: NAVY, marginLeft: 2 }}>{m.schedulerName}</strong> <span className="text-gray-400 ml-1">({m.schedulerRole})</span></span>
                            {m.clientPhone && <span className="flex items-center gap-1.5 text-xs text-gray-500"><IconPhone size={11} /> {m.clientPhone}</span>}
                          </div>
                          {m.notes && (
                            <div className="mt-2.5 bg-gray-50 rounded-lg px-3 py-2 text-xs text-gray-500 flex items-start gap-1.5">
                              <IconNote size={11} /> {m.notes}
                            </div>
                          )}
                        </div>
                        <div className="flex flex-col gap-2 shrink-0">
                          <select value={m.status} onChange={(e) => updateStatus(m.id, e.target.value)}
                            className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs font-bold cursor-pointer bg-gray-50 outline-none" style={{ color: NAVY }}>
                            <option value="agendado">Agendado</option>
                            <option value="realizado">Realizado</option>
                            <option value="cancelado">Cancelado</option>
                            <option value="noshow">No-show</option>
                          </select>
                          <button onClick={() => removeMeeting(m.id)}
                            className="flex items-center justify-center gap-1 border rounded-lg px-2 py-1.5 text-xs font-semibold hover:bg-red-50"
                            style={{ borderColor: "#FCA5A5", color: "#B91C1C", background: "none", cursor: "pointer" }}>
                            <IconTrash size={11} /> Remover
                          </button>
                        </div>
                      </div>
                    );
                  })}
                  {filtered.length === 0 && (
                    <div className="bg-white rounded-xl shadow-sm py-20 text-center">
                      <div style={{ fontSize: 48 }}>📭</div>
                      <div className="text-gray-400 text-sm mt-3">Nenhum agendamento encontrado</div>
                      <button onClick={() => setTab("agendar")} className="mt-3 text-sm font-bold underline" style={{ color: NAVY, background: "none", border: "none", cursor: "pointer" }}>Criar agendamento →</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
