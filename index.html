<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ================= CONSTANTES DA EQUIPE ================= */
const AGENDADOR_FUNCAO = {
  "Izabel": "SDR",
  "Kelly": "SDR",
  "Daniel": "Social Seller",
  "Camila": "Social Seller",
};
const AGENDADORES = Object.keys(AGENDADOR_FUNCAO);
const CLOSERS = ["Laís", "Júlia", "Léo", "Malu", "Franklin", "Daniel"];
const TIPOS = ["Reunião", "Consulta"];
const STATUS_LIST = ["Agendado", "Realizado", "No-show", "Cancelado"];
const STATUS_COLORS = {
  "Agendado": "bg-blue-100 text-blue-800",
  "Realizado": "bg-green-100 text-green-800",
  "No-show": "bg-red-100 text-red-800",
  "Cancelado": "bg-slate-200 text-slate-600",
};
const DDI_LIST = [
  { code: "55", label: "🇧🇷 +55 Brasil" },
  { code: "1", label: "🇺🇸 +1 EUA/Canadá" },
  { code: "351", label: "🇵🇹 +351 Portugal" },
  { code: "44", label: "🇬🇧 +44 Reino Unido" },
  { code: "34", label: "🇪🇸 +34 Espanha" },
  { code: "39", label: "🇮🇹 +39 Itália" },
  { code: "49", label: "🇩🇪 +49 Alemanha" },
  { code: "33", label: "🇫🇷 +33 França" },
  { code: "54", label: "🇦🇷 +54 Argentina" },
  { code: "598", label: "🇺🇾 +598 Uruguai" },
];

const NAVY = "#1F3864";
const GOLD = "#C5A24A";

/* ================= HELPERS DE DATA ================= */
function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function parseISO(iso) {
  if (!iso) return null;
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtBR(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function isoWeekKey(iso) {
  const d = parseISO(iso);
  if (!d) return null;
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = new Date(target.getFullYear(), 0, 4);
  const diff = target - firstThursday;
  const week = 1 + Math.round(diff / (7 * 24 * 60 * 60 * 1000));
  return `${target.getFullYear()}-S${String(week).padStart(2, "0")}`;
}
function mesKey(iso) {
  if (!iso) return null;
  return iso.slice(0, 7);
}
function mondayOf(iso) {
  const d = parseISO(iso);
  const dayNr = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dayNr);
  return d;
}
function weekLabel(wk) {
  return wk ? wk.replace("-", " · Semana ") : "—";
}
function mesLabelBR(mk) {
  if (!mk) return "—";
  const [y, m] = mk.split("-");
  const nomes = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  return `${nomes[parseInt(m, 10) - 1]}/${y}`;
}

/* ================= APP RAIZ ================= */
function App() {
  const [authReady, setAuthReady] = useState(false);
  const [authError, setAuthError] = useState(null);
  const [meetings, setMeetings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dataError, setDataError] = useState(null);
  const [view, setView] = useState("dashboard");

  useEffect(() => {
    let unsubSnapshot = () => {};
    const unsubAuth = auth.onAuthStateChanged((user) => {
      if (user) {
        setAuthReady(true);
        unsubSnapshot = db.collection("meetings").onSnapshot(
          (snap) => {
            const arr = [];
            snap.forEach((doc) => arr.push({ id: doc.id, ...doc.data() }));
            arr.sort((a, b) => (a.dataReuniao || "").localeCompare(b.dataReuniao || "") || (a.horario || "").localeCompare(b.horario || ""));
            setMeetings(arr);
            setLoading(false);
          },
          (err) => {
            console.error(err);
            setDataError("Erro ao carregar agendamentos. Verifique as credenciais do Firebase no topo do arquivo e as regras do Firestore.");
            setLoading(false);
          }
        );
      } else {
        auth.signInAnonymously().catch((err) => {
          console.error(err);
          setAuthError("Não foi possível autenticar. Verifique se o login Anônimo está habilitado em Firebase > Authentication > Sign-in method.");
          setLoading(false);
        });
      }
    });
    return () => { unsubAuth(); unsubSnapshot(); };
  }, []);

  async function createMeeting(data) {
    await db.collection("meetings").add({ ...data, reagendamentos: 0, criadoEm: new Date().toISOString() });
  }
  async function updateMeeting(id, data) {
    await db.collection("meetings").doc(id).update(data);
  }

  if (authError) {
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="bg-white border border-red-200 rounded-xl p-6 max-w-lg text-center">
          <p className="text-red-700 font-semibold mb-2">Erro de autenticação</p>
          <p className="text-slate-600 text-sm">{authError}</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen">
      <header style={{ backgroundColor: NAVY }} className="text-white shadow-md">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2">
            <span className="text-lg font-bold tracking-wide">MMADV</span>
            <span className="text-sm text-slate-300">| Agendamento Comercial</span>
          </div>
          <nav className="flex gap-1">
            {[
              ["dashboard", "📊 Dashboard"],
              ["agendar", "➕ Agendar"],
              ["agenda", "🗓️ Agenda"],
            ].map(([key, label]) => (
              <button
                key={key}
                onClick={() => setView(key)}
                className={`px-4 py-2 rounded-md text-sm font-medium transition ${
                  view === key ? "bg-white text-slate-900" : "text-slate-200 hover:bg-white/10"
                }`}
                style={view === key ? { color: NAVY } : {}}
              >
                {label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {dataError && (
          <div className="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3">{dataError}</div>
        )}
        {loading || !authReady ? (
          <div className="text-center py-20 text-slate-500">Carregando agendamentos…</div>
        ) : (
          <React.Fragment>
            {view === "dashboard" && <Dashboard meetings={meetings} />}
            {view === "agendar" && <Agendar onCreate={createMeeting} meetings={meetings} onDone={() => setView("agenda")} />}
            {view === "agenda" && <Agenda meetings={meetings} onUpdate={updateMeeting} />}
          </React.Fragment>
        )}
      </main>
    </div>
  );
}

/* ================= DASHBOARD ================= */
function Dashboard({ meetings }) {
  const [periodType, setPeriodType] = useState("total"); // 'semana' | 'mes' | 'total'
  const [periodValue, setPeriodValue] = useState("");
  const [rankBase, setRankBase] = useState("reuniao"); // 'reuniao' | 'agendamento'

  const semanasDisponiveis = useMemo(() => {
    const s = new Set(meetings.map((m) => isoWeekKey(m.dataAgendamento)).filter(Boolean));
    s.add(isoWeekKey(todayISO()));
    return Array.from(s).sort().reverse();
  }, [meetings]);
  const mesesDisponiveis = useMemo(() => {
    const s = new Set(meetings.map((m) => mesKey(m.dataAgendamento)).filter(Boolean));
    s.add(mesKey(todayISO()));
    return Array.from(s).sort().reverse();
  }, [meetings]);

  useEffect(() => {
    if (periodType === "semana" && !periodValue) setPeriodValue(semanasDisponiveis[0] || "");
    if (periodType === "mes" && !periodValue) setPeriodValue(mesesDisponiveis[0] || "");
  }, [periodType]);

  function inPeriod(m) {
    const refField = rankBase === "reuniao" ? m.dataReuniao : m.dataAgendamento;
    if (periodType === "total") return true;
    if (periodType === "semana") return isoWeekKey(refField) === periodValue;
    if (periodType === "mes") return mesKey(refField) === periodValue;
    return true;
  }

  const filtrados = meetings.filter(inPeriod);
  const total = filtrados.length;
  const realizados = filtrados.filter((m) => m.status === "Realizado").length;
  const noshow = filtrados.filter((m) => m.status === "No-show").length;
  const cancelados = filtrados.filter((m) => m.status === "Cancelado").length;
  const taxaRealizacao = total ? ((realizados / total) * 100).toFixed(1) : "0.0";

  const porAgendador = useMemo(() => {
    const map = {};
    AGENDADORES.forEach((a) => (map[a] = 0));
    filtrados.forEach((m) => { if (m.agendador) map[m.agendador] = (map[m.agendador] || 0) + 1; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [filtrados]);

  const porCloser = useMemo(() => {
    const map = {};
    CLOSERS.forEach((c) => (map[c] = { recebidas: 0, realizadas: 0, noshow: 0 }));
    filtrados.forEach((m) => {
      if (!m.closer || !map[m.closer]) return;
      map[m.closer].recebidas += 1;
      if (m.status === "Realizado") map[m.closer].realizadas += 1;
      if (m.status === "No-show") map[m.closer].noshow += 1;
    });
    return Object.entries(map).sort((a, b) => b[1].realizadas - a[1].realizadas);
  }, [filtrados]);

  const ultimasSemanas = useMemo(() => {
    const map = {};
    meetings.forEach((m) => {
      const wk = isoWeekKey(m.dataAgendamento);
      if (wk) map[wk] = (map[wk] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).slice(-8);
  }, [meetings]);
  const maxSemana = Math.max(1, ...ultimasSemanas.map(([, v]) => v));

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard label="Total no período" value={total} color={NAVY} />
        <StatCard label="Realizadas" value={realizados} color="#2F8F5B" />
        <StatCard label="No-show" value={noshow} color="#C0392B" />
        <StatCard label="Taxa de realização" value={`${taxaRealizacao}%`} color={GOLD} />
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex flex-wrap items-center gap-3 mb-4">
          <span className="text-sm font-semibold text-slate-700">🏅 Ranking por período:</span>
          {["semana", "mes", "total"].map((p) => (
            <button
              key={p}
              onClick={() => { setPeriodType(p); setPeriodValue(""); }}
              className={`px-3 py-1.5 rounded-md text-sm font-medium border ${
                periodType === p ? "text-white border-transparent" : "text-slate-600 border-slate-300 hover:bg-slate-50"
              }`}
              style={periodType === p ? { backgroundColor: NAVY } : {}}
            >
              {p === "semana" ? "Semana" : p === "mes" ? "Mês" : "Total"}
            </button>
          ))}
          {periodType === "semana" && (
            <select value={periodValue} onChange={(e) => setPeriodValue(e.target.value)} className="border border-slate-300 rounded-md px-2 py-1.5 text-sm">
              {semanasDisponiveis.map((w) => <option key={w} value={w}>{weekLabel(w)}</option>)}
            </select>
          )}
          {periodType === "mes" && (
            <select value={periodValue} onChange={(e) => setPeriodValue(e.target.value)} className="border border-slate-300 rounded-md px-2 py-1.5 text-sm">
              {mesesDisponiveis.map((mk) => <option key={mk} value={mk}>{mesLabelBR(mk)}</option>)}
            </select>
          )}
          <span className="text-xs text-slate-400 ml-auto">Base da data: reunião</span>
        </div>

        <div className="grid md:grid-cols-2 gap-6">
          <div>
            <h3 className="text-sm font-semibold text-slate-700 mb-2">🏆 Quem mais agendou (SDR / Social Seller)</h3>
            <table className="w-full text-sm">
              <tbody>
                {porAgendador.map(([nome, qtd], i) => (
                  <tr key={nome} className="border-b border-slate-100">
                    <td className="py-1.5 text-slate-500 w-6">{i + 1}º</td>
                    <td className="py-1.5">{nome} <span className="text-xs text-slate-400">({AGENDADOR_FUNCAO[nome]})</span></td>
                    <td className="py-1.5 text-right font-semibold" style={{ color: NAVY }}>{qtd}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div>
            <h3 className="text-sm font-semibold text-slate-700 mb-2">✅ Closers — reuniões realizadas</h3>
            <table className="w-full text-sm">
              <tbody>
                {porCloser.map(([nome, v], i) => (
                  <tr key={nome} className="border-b border-slate-100">
                    <td className="py-1.5 text-slate-500 w-6">{i + 1}º</td>
                    <td className="py-1.5">{nome}</td>
                    <td className="py-1.5 text-right font-semibold" style={{ color: GOLD }}>{v.realizadas}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="text-sm font-semibold text-slate-700 mb-3">Desempenho por Closer (recebidas x realizadas x no-show) — período selecionado</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-slate-500 border-b border-slate-200">
                <th className="py-2">Closer</th>
                <th className="py-2 text-right">Recebidas</th>
                <th className="py-2 text-right">Realizadas</th>
                <th className="py-2 text-right">No-show</th>
                <th className="py-2 text-right">Taxa realização</th>
              </tr>
            </thead>
            <tbody>
              {porCloser.map(([nome, v]) => (
                <tr key={nome} className="border-b border-slate-100">
                  <td className="py-2">{nome}</td>
                  <td className="py-2 text-right">{v.recebidas}</td>
                  <td className="py-2 text-right">{v.realizadas}</td>
                  <td className="py-2 text-right">{v.noshow}</td>
                  <td className="py-2 text-right font-semibold" style={{ color: NAVY }}>
                    {v.recebidas ? ((v.realizadas / v.recebidas) * 100).toFixed(1) : "0.0"}%
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="text-sm font-semibold text-slate-700 mb-3">Agendamentos por semana (últimas 8 semanas — todas as datas)</h3>
        <div className="flex items-end gap-3 h-40">
          {ultimasSemanas.map(([wk, v]) => (
            <div key={wk} className="flex-1 flex flex-col items-center gap-1">
              <span className="text-xs text-slate-500">{v}</span>
              <div className="w-full rounded-t-md" style={{ height: `${(v / maxSemana) * 100}px`, backgroundColor: NAVY, minHeight: "4px" }}></div>
              <span className="text-[10px] text-slate-400">{wk.split("-S")[1]}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, color }) {
  return (
    <div className="bg-white rounded-xl border border-slate-200 p-4">
      <div className="text-2xl font-bold" style={{ color }}>{value}</div>
      <div className="text-xs text-slate-500 mt-1">{label}</div>
    </div>
  );
}

/* ================= AGENDAR ================= */
function Agendar({ onCreate, meetings, onDone }) {
  const [form, setForm] = useState({
    tipo: "Reunião",
    cliente: "",
    ddi: "55",
    telefone: "",
    agendador: AGENDADORES[0],
    closer: CLOSERS[0],
    dataAgendamento: todayISO(),
    dataReuniao: todayISO(),
    horario: "",
    observacoes: "",
  });
  const [conflito, setConflito] = useState(null);
  const [saving, setSaving] = useState(false);
  const [okMsg, setOkMsg] = useState(false);

  function set(field, value) {
    setForm((f) => ({ ...f, [field]: value }));
  }

  function checkConflito(f) {
    return meetings.find(
      (m) => m.closer === f.closer && m.dataReuniao === f.dataReuniao && m.horario === f.horario && m.status !== "Cancelado"
    );
  }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.cliente || !form.horario || !form.dataReuniao) return;
    const c = checkConflito(form);
    if (c) { setConflito(c); return; }
    setSaving(true);
    try {
      await onCreate({
        tipo: form.tipo,
        cliente: form.cliente,
        telefone: `+${form.ddi} ${form.telefone}`,
        agendador: form.agendador,
        funcao: AGENDADOR_FUNCAO[form.agendador],
        closer: form.closer,
        dataAgendamento: form.dataAgendamento,
        dataReuniao: form.dataReuniao,
        horario: form.horario,
        status: "Agendado",
        observacoes: form.observacoes,
      });
      setOkMsg(true);
      setForm((f) => ({ ...f, cliente: "", telefone: "", horario: "", observacoes: "" }));
      setTimeout(() => setOkMsg(false), 3000);
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="max-w-2xl mx-auto bg-white rounded-xl border border-slate-200 p-6">
      <h2 className="text-lg font-bold mb-4" style={{ color: NAVY }}>Novo Agendamento</h2>

      {okMsg && <div className="mb-4 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg p-3">Agendamento criado com sucesso!</div>}
      {conflito && (
        <div className="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3">
          ⚠️ Conflito de agenda: {conflito.closer} já tem "{conflito.cliente}" marcado em {fmtBR(conflito.dataReuniao)} às {conflito.horario}.
          <button onClick={() => setConflito(null)} className="ml-2 underline">fechar</button>
        </div>
      )}

      <form onSubmit={handleSubmit} className="space-y-4">
        <div className="grid grid-cols-2 gap-4">
          <Field label="Tipo">
            <select value={form.tipo} onChange={(e) => set("tipo", e.target.value)} className="input">
              {TIPOS.map((t) => <option key={t}>{t}</option>)}
            </select>
          </Field>
          <Field label="Cliente">
            <input required value={form.cliente} onChange={(e) => set("cliente", e.target.value)} className="input" placeholder="Nome do cliente" />
          </Field>
        </div>

        <div className="grid grid-cols-3 gap-4">
          <Field label="DDI">
            <select value={form.ddi} onChange={(e) => set("ddi", e.target.value)} className="input">
              {DDI_LIST.map((d) => <option key={d.code} value={d.code}>{d.label}</option>)}
            </select>
          </Field>
          <Field label="Telefone" className="col-span-2">
            <input value={form.telefone} onChange={(e) => set("telefone", e.target.value)} className="input" placeholder="DDD + número" />
          </Field>
        </div>

        <div className="grid grid-cols-2 gap-4">
          <Field label="Agendador (SDR / Social Seller)">
            <select value={form.agendador} onChange={(e) => set("agendador", e.target.value)} className="input">
              {AGENDADORES.map((a) => <option key={a} value={a}>{a} — {AGENDADOR_FUNCAO[a]}</option>)}
            </select>
          </Field>
          <Field label="Closer">
            <select value={form.closer} onChange={(e) => set("closer", e.target.value)} className="input">
              {CLOSERS.map((c) => <option key={c}>{c}</option>)}
            </select>
          </Field>
        </div>

        <div className="grid grid-cols-3 gap-4">
          <Field label="Data do agendamento">
            <input type="date" value={form.dataAgendamento} onChange={(e) => set("dataAgendamento", e.target.value)} className="input" />
          </Field>
          <Field label="Data da reunião">
            <input required type="date" value={form.dataReuniao} onChange={(e) => set("dataReuniao", e.target.value)} className="input" />
          </Field>
          <Field label="Horário">
            <input required type="time" value={form.horario} onChange={(e) => set("horario", e.target.value)} className="input" />
          </Field>
        </div>

        <Field label="Observações">
          <textarea value={form.observacoes} onChange={(e) => set("observacoes", e.target.value)} className="input" rows="3" placeholder="Opcional"></textarea>
        </Field>

        <button type="submit" disabled={saving} className="w-full py-2.5 rounded-md text-white font-semibold disabled:opacity-50" style={{ backgroundColor: NAVY }}>
          {saving ? "Salvando…" : "Agendar"}
        </button>
      </form>
      <style>{`.input { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; }`}</style>
    </div>
  );
}

function Field({ label, children, className }) {
  return (
    <div className={className}>
      <label className="block text-xs font-medium text-slate-500 mb-1">{label}</label>
      {children}
    </div>
  );
}

/* ================= AGENDA ================= */
function Agenda({ meetings, onUpdate }) {
  const [fTipo, setFTipo] = useState("");
  const [fCloser, setFCloser] = useState("");
  const [fStatus, setFStatus] = useState("");
  const [fAgendador, setFAgendador] = useState("");
  const [sort, setSort] = useState("asc");
  const [reagendandoId, setReagendandoId] = useState(null);
  const [editandoId, setEditandoId] = useState(null);

  const filtrados = useMemo(() => {
    let arr = meetings.filter((m) =>
      (!fTipo || m.tipo === fTipo) &&
      (!fCloser || m.closer === fCloser) &&
      (!fStatus || m.status === fStatus) &&
      (!fAgendador || m.agendador === fAgendador)
    );
    arr.sort((a, b) => {
      const c = (a.dataReuniao || "").localeCompare(b.dataReuniao || "") || (a.horario || "").localeCompare(b.horario || "");
      return sort === "asc" ? c : -c;
    });
    return arr;
  }, [meetings, fTipo, fCloser, fStatus, fAgendador, sort]);

  function exportarExcel() {
    const rows = filtrados.map((m) => ({
      "Data do agendamento": fmtBR(m.dataAgendamento),
      "Data da reunião": fmtBR(m.dataReuniao),
      "Horário": m.horario || "",
      "Tipo": m.tipo || "",
      "Cliente": m.cliente || "",
      "Telefone": m.telefone || "",
      "Agendador": m.agendador || "",
      "Função": m.funcao || "",
      "Closer": m.closer || "",
      "Status": m.status || "",
      "Reagendamentos": m.reagendamentos || 0,
      "Observações": m.observacoes || "",
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
    const hoje = todayISO();
    XLSX.writeFile(wb, `MMADV_Agendamentos_${hoje}.xlsx`);
  }

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl border border-slate-200 p-4 flex flex-wrap gap-2 items-center">
        <select value={fTipo} onChange={(e) => setFTipo(e.target.value)} className="filtro">
          <option value="">Tipo (todos)</option>
          {TIPOS.map((t) => <option key={t}>{t}</option>)}
        </select>
        <select value={fCloser} onChange={(e) => setFCloser(e.target.value)} className="filtro">
          <option value="">Closer (todos)</option>
          {CLOSERS.map((c) => <option key={c}>{c}</option>)}
        </select>
        <select value={fStatus} onChange={(e) => setFStatus(e.target.value)} className="filtro">
          <option value="">Status (todos)</option>
          {STATUS_LIST.map((s) => <option key={s}>{s}</option>)}
        </select>
        <select value={fAgendador} onChange={(e) => setFAgendador(e.target.value)} className="filtro">
          <option value="">Agendador (todos)</option>
          {AGENDADORES.map((a) => <option key={a}>{a}</option>)}
        </select>
        <select value={sort} onChange={(e) => setSort(e.target.value)} className="filtro">
          <option value="asc">Data da reunião ↑</option>
          <option value="desc">Data da reunião ↓</option>
        </select>
        <button onClick={exportarExcel} className="ml-auto px-3 py-1.5 rounded-md text-sm font-medium text-white" style={{ backgroundColor: GOLD }}>
          ⬇️ Baixar Excel
        </button>
        <style>{`.filtro { border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 8px; font-size: 13px; }`}</style>
      </div>

      <div className="text-xs text-slate-500">{filtrados.length} agendamento(s) encontrado(s)</div>

      <div className="space-y-3">
        {filtrados.map((m) => (
          <MeetingCard
            key={m.id}
            m={m}
            meetings={meetings}
            onUpdate={onUpdate}
            reagendando={reagendandoId === m.id}
            editando={editandoId === m.id}
            onToggleReagendar={() => { setReagendandoId(reagendandoId === m.id ? null : m.id); setEditandoId(null); }}
            onToggleEditar={() => { setEditandoId(editandoId === m.id ? null : m.id); setReagendandoId(null); }}
          />
        ))}
        {filtrados.length === 0 && <div className="text-center py-12 text-slate-400 text-sm">Nenhum agendamento encontrado com esses filtros.</div>}
      </div>
    </div>
  );
}

function MeetingCard({ m, meetings, onUpdate, reagendando, editando, onToggleReagendar, onToggleEditar }) {
  const [novaData, setNovaData] = useState(m.dataReuniao);
  const [novoHorario, setNovoHorario] = useState(m.horario);
  const [erroReag, setErroReag] = useState(null);

  const [editForm, setEditForm] = useState({ ...m });
  useEffect(() => { setEditForm({ ...m }); }, [editando]);

  async function confirmarReagendamento() {
    const conflito = meetings.find(
      (o) => o.id !== m.id && o.closer === m.closer && o.dataReuniao === novaData && o.horario === novoHorario && o.status !== "Cancelado"
    );
    if (conflito) { setErroReag(`${m.closer} já tem "${conflito.cliente}" nesse horário.`); return; }
    await onUpdate(m.id, { dataReuniao: novaData, horario: novoHorario, status: "Agendado", reagendamentos: (m.reagendamentos || 0) + 1 });
    setErroReag(null);
    onToggleReagendar();
  }

  async function salvarEdicao() {
    await onUpdate(m.id, {
      tipo: editForm.tipo, cliente: editForm.cliente, telefone: editForm.telefone,
      agendador: editForm.agendador, funcao: AGENDADOR_FUNCAO[editForm.agendador] || editForm.funcao,
      closer: editForm.closer, dataAgendamento: editForm.dataAgendamento, dataReuniao: editForm.dataReuniao,
      horario: editForm.horario, status: editForm.status, observacoes: editForm.observacoes,
    });
    onToggleEditar();
  }

  async function mudarStatus(novo) {
    await onUpdate(m.id, { status: novo });
  }

  return (
    <div className="bg-white rounded-xl border border-slate-200 p-4">
      <div className="flex flex-wrap items-start justify-between gap-2">
        <div>
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-slate-800">{m.cliente}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full ${STATUS_COLORS[m.status] || "bg-slate-100 text-slate-600"}`}>{m.status}</span>
            <span className="text-xs text-slate-400">{m.tipo}</span>
            {m.reagendamentos > 0 && <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-800">🔄 Reagendado {m.reagendamentos}x</span>}
          </div>
          <div className="text-sm text-slate-500 mt-1">
            📅 {fmtBR(m.dataReuniao)} às {m.horario} · Agendado em {fmtBR(m.dataAgendamento)}
          </div>
          <div className="text-sm text-slate-500">
            👤 Closer: <b>{m.closer}</b> · Agendador: {m.agendador} ({m.funcao}) · 📞 {m.telefone}
          </div>
          {m.observacoes && <div className="text-sm text-slate-400 mt-1 italic">"{m.observacoes}"</div>}
        </div>
        <div className="flex gap-2 flex-wrap">
          {STATUS_LIST.filter((s) => s !== m.status).map((s) => (
            <button key={s} onClick={() => mudarStatus(s)} className="text-xs px-2 py-1 rounded-md border border-slate-300 hover:bg-slate-50">{s}</button>
          ))}
          <button onClick={onToggleReagendar} className="text-xs px-2 py-1 rounded-md border border-slate-300 hover:bg-slate-50">🔄 Reagendar</button>
          <button onClick={onToggleEditar} className="text-xs px-2 py-1 rounded-md border border-slate-300 hover:bg-slate-50">✏️ Editar</button>
        </div>
      </div>

      {reagendando && (
        <div className="mt-3 p-3 bg-slate-50 rounded-lg flex flex-wrap items-end gap-3">
          {erroReag && <div className="w-full text-sm text-red-600">⚠️ {erroReag}</div>}
          <Field label="Nova data"><input type="date" value={novaData} onChange={(e) => setNovaData(e.target.value)} className="input" /></Field>
          <Field label="Novo horário"><input type="time" value={novoHorario} onChange={(e) => setNovoHorario(e.target.value)} className="input" /></Field>
          <button onClick={confirmarReagendamento} className="px-3 py-2 rounded-md text-white text-sm" style={{ backgroundColor: NAVY }}>Confirmar</button>
          <button onClick={onToggleReagendar} className="px-3 py-2 rounded-md border border-slate-300 text-sm">Cancelar</button>
        </div>
      )}

      {editando && (
        <div className="mt-3 p-3 bg-slate-50 rounded-lg space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Cliente"><input value={editForm.cliente} onChange={(e) => setEditForm({ ...editForm, cliente: e.target.value })} className="input" /></Field>
            <Field label="Telefone"><input value={editForm.telefone} onChange={(e) => setEditForm({ ...editForm, telefone: e.target.value })} className="input" /></Field>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Tipo">
              <select value={editForm.tipo} onChange={(e) => setEditForm({ ...editForm, tipo: e.target.value })} className="input">
                {TIPOS.map((t) => <option key={t}>{t}</option>)}
              </select>
            </Field>
            <Field label="Agendador">
              <select value={editForm.agendador} onChange={(e) => setEditForm({ ...editForm, agendador: e.target.value })} className="input">
                {AGENDADORES.map((a) => <option key={a}>{a}</option>)}
              </select>
            </Field>
            <Field label="Closer">
              <select value={editForm.closer} onChange={(e) => setEditForm({ ...editForm, closer: e.target.value })} className="input">
                {CLOSERS.map((c) => <option key={c}>{c}</option>)}
              </select>
            </Field>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Data do agendamento"><input type="date" value={editForm.dataAgendamento} onChange={(e) => setEditForm({ ...editForm, dataAgendamento: e.target.value })} className="input" /></Field>
            <Field label="Data da reunião"><input type="date" value={editForm.dataReuniao} onChange={(e) => setEditForm({ ...editForm, dataReuniao: e.target.value })} className="input" /></Field>
            <Field label="Horário"><input type="time" value={editForm.horario} onChange={(e) => setEditForm({ ...editForm, horario: e.target.value })} className="input" /></Field>
          </div>
          <Field label="Status">
            <select value={editForm.status} onChange={(e) => setEditForm({ ...editForm, status: e.target.value })} className="input">
              {STATUS_LIST.map((s) => <option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Observações"><textarea value={editForm.observacoes || ""} onChange={(e) => setEditForm({ ...editForm, observacoes: e.target.value })} className="input" rows="2"></textarea></Field>
          <div className="flex gap-2">
            <button onClick={salvarEdicao} className="px-3 py-2 rounded-md text-white text-sm" style={{ backgroundColor: NAVY }}>Salvar</button>
            <button onClick={onToggleEditar} className="px-3 py-2 rounded-md border border-slate-300 text-sm">Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
